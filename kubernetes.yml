apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-salesdataset
  labels:
    app: api-salesdataset
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-salesdataset
  template:
    metadata:
      labels:
        app: api-salesdataset
    spec:
      containers:
        - name: api
          image: api-salesdataset:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: api-salesdataset-secrets
                  key: DATABASE_URL
            - name: APP_NAME
              value: "Sales Dataset API"
            - name: DEBUG
              value: "false"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api-salesdataset-svc
spec:
  selector:
    app: api-salesdataset
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
